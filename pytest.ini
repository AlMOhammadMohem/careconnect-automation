[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=reports/report.html
        --self-contained-html
            --verbose
                -s
                markers =
                    smoke: Smoke tests - critical path only
                        regression: Full regression suite
                            negative: Negative/invalid input tests
                                ui: UI element validation tests
